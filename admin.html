<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إشعارات الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f6f9; padding: 20px; }
        .header {
            background: linear-gradient(135deg, #0056b3, #004494);
            color: white; padding: 20px; border-radius: 15px;
            text-align: center; margin-bottom: 20px;
        }
        .badge { 
            background: #ffc107; color: black; padding: 5px 12px; 
            border-radius: 15px; font-size: 12px; font-weight: bold; 
        }
        .card {
            background: white; border-radius: 12px; padding: 15px; 
            margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            border-right: 4px solid #0056b3;
        }
        .card h3 { color: #0056b3; margin-bottom: 8px; font-size: 18px; }
        .card p { color: #555; line-height: 1.6; font-size: 15px; }
        .editable {
            background-color: #fff9c4; border: 1px dashed #fbc02d;
            padding: 8px; border-radius: 8px; outline: none;
        }
        .btn {
            display: block; width: 100%; padding: 15px; border: none; 
            border-radius: 10px; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-bottom: 10px; color: white;
        }
        .btn-blue { background-color: #00acc1; }
        .btn-green { background-color: #2e7d32; }
        .btn-gray { background-color: #757575; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; 
            width: 85%; max-width: 350px; text-align: center;
        }
        .modal input {
            width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd;
            border-radius: 10px; font-size: 18px; text-align: center;
        }
        .error-msg { color: red; font-size: 14px; display: none; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📢 نظام الإشعارات - الاختبارات</h2>
        <span class="badge" id="modeBadge">وضع الطالب (عرض فقط)</span>
    </div>

    <div id="notificationsList"></div>

    <button id="loginBtn" class="btn btn-blue" onclick="showModal()">🔐 الدخول لوضع التعديل (للمعلم)</button>
    <button id="saveBtn" class="btn btn-green" style="display:none;" onclick="saveAll()">💾 حفظ جميع التغييرات</button>
    <button id="addBtn" class="btn btn-green" style="display:none;" onclick="addNotification()">➕ إضافة إشعار جديد</button>
    <button id="exitBtn" class="btn btn-gray" style="display:none;" onclick="exitAdmin()">🔓 خروج</button>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>🔐 أدخل كلمة المرور</h3>
            <input type="password" id="passInput" placeholder="كلمة المرور..." inputmode="numeric">
            <p class="error-msg" id="errorMsg">❌ كلمة المرور غير صحيحة</p>
            <button class="btn btn-blue" onclick="checkPassword()">دخول</button>
            <button class="btn btn-gray" onclick="hideModal()">إلغاء</button>
        </div>
    </div>

<script>
    const TEACHER_PASS = "12345"; // ✅ كلمة المرور الصحيحة
    let isAdmin = false;
    
    let notifications = JSON.parse(localStorage.getItem('testNotifs')) || [
        { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "احضر معك الكتاب والكراس" },
        { id: 2, title: "📊 نتائج الاختبار", content: "تم إعلان النتائج" }
    ];

    function render() {
        const list = document.getElementById('notificationsList');
        list.innerHTML = notifications.map((item, index) => `
            <div class="card">
                <h3 class="${isAdmin ? 'editable' : ''}" ${isAdmin ? 'contenteditable="true"' : ''} 
                    oninput="notifications[${index}].title=this.innerText">${item.title}</h3>
                <p class="${isAdmin ? 'editable' : ''}" ${isAdmin ? 'contenteditable="true"' : ''}
                    oninput="notifications[${index}].content=this.innerText">${item.content}</p>
                ${isAdmin ? `<button class="btn btn-gray" style="padding:8px;margin-top:10px;" onclick="deleteNotif(${index})">🗑️ حذف</button>` : ''}
            </div>
        `).join('');

        document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'block';
        document.getElementById('saveBtn').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('addBtn').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('exitBtn').style.display = isAdmin ? 'block' : 'none';
        
        const badge = document.getElementById('modeBadge');
        badge.textContent = isAdmin ? 'وضع المعلم (تعديل)' : 'وضع الطالب (عرض فقط)';
        badge.style.background = isAdmin ? '#ef5350' : '#ffc107';
    }

    function showModal() {
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passInput').value = '';
        document.getElementById('errorMsg').style.display = 'none';
        setTimeout(() => document.getElementById('passInput').focus(), 300);
    }

    function hideModal() {
        document.getElementById('passwordModal').style.display = 'none';
    }

    function checkPassword() {
        const input = document.getElementById('passInput').value;
        console.log("Entered:", input, "Expected:", TEACHER_PASS); // للتحقق
        if (input === TEACHER_PASS) {
            isAdmin = true;
            hideModal();
            render();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function saveAll() {
        localStorage.setItem('testNotifs', JSON.stringify(notifications));
        alert('✅ تم الحفظ');
    }

    function addNotification() {
        notifications.unshift({ id: Date.now(), title: "إشعار جديد", content: "المحتوى..." });
        render();
    }

    function deleteNotif(index) {
        notifications.splice(index, 1);
        render();
    }

    function exitAdmin() {
        isAdmin = false;
        render();
    }

    // دعم زر Enter
    document.getElementById('passInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });

    render();
</script>
</body>
</html>
