<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>إدارة الإشعارات - الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: auto;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f5f7fb;
            padding: 15px;
            direction: rtl;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            width: 100%;
        }
        
        .header {
            background: linear-gradient(135deg, #1e4663, #2a5a82);
            color: white;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.2rem;
            margin: 5px 0;
        }
        
        .badge {
            display: inline-block;
            background: #dc3545;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .notifications-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-right: 5px solid #2a5a82;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e4663;
            margin-bottom: 12px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            background: #fefefe;
        }
        
        input:focus, textarea:focus {
            border-color: #2a5a82;
            outline: none;
        }
        
        .save-single {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .save-all-btn {
            background: #1e4663;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
        }
        
        footer {
            text-align: center;
            margin-top: 35px;
            color: #7f8c8d;
            font-size: 12px;
            padding: 15px 0 10px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        @media (min-width: 700px) {
            .notifications-grid {
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            }
            body {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> ثانوية صلاح الدين جالو</h1>
        <h1><i class="fas fa-edit"></i> لوحة تحكم الإشعارات - الاختبارات</h1>
        <div class="badge">
            <i class="fas fa-user-cog"></i> وضع التعديل (أزرار الحفظ ظاهرة)
        </div>
    </div>

    <div class="notifications-grid" id="notificationsContainer"></div>
    
    <footer>
        <i class="fas fa-save"></i> يمكنك تعديل النصوص ثم الضغط على حفظ - محمد عيادة 2026
    </footer>
</div>
<div id="toastMsg" class="toast">✓ تم الحفظ</div>

<script>
    // بيانات الإشعارات الافتراضية
    let notifications = [
        { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "موعد اختبار منتصف الفصل لمادة قواعد البيانات: الأربعاء القادم الساعة 10 صباحاً." },
        { id: 2, title: "📊 نتائج الاختبار التجريبي", content: "تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%. يرجى مراجعة حساباتكم." },
        { id: 3, title: "⚙️ تحديث المنصة", content: "تم إضافة ميزة مراجعة الإجابات بعد الاختبار. نوصي بتحديث التطبيق." },
        { id: 4, title: "⏳ موعد التسليم", content: "آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025." },
        { id: 5, title: "📚 محاضرة مراجعة", content: "محاضرة مراجعة شاملة يوم السبت من 2 إلى 4 مساءً (قاعة A101)." }
    ];

    // تحميل البيانات المخزنة
    function loadData() {
        const stored = localStorage.getItem("exam_app_notifications");
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    notifications = parsed;
                }
            } catch(e) {}
        }
        render();
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 2000);
    }

    function saveAllChanges() {
        notifications.forEach(notif => {
            const titleEl = document.getElementById(`title-${notif.id}`);
            const contentEl = document.getElementById(`content-${notif.id}`);
            if (titleEl && contentEl) {
                notif.title = titleEl.value;
                notif.content = contentEl.value;
            }
        });
        localStorage.setItem("exam_app_notifications", JSON.stringify(notifications));
        showToast("✓ تم حفظ جميع الإشعارات بنجاح!");
    }
    
    function deleteNotification(id) {
        if (confirm('هل أنت متأكد من حذف هذا الإشعار؟')) {
            notifications = notifications.filter(n => n.id !== id);
            // إعادة ترتيب المعرفات
            notifications.forEach((notif, index) => {
                notif.id = index + 1;
            });
            localStorage.setItem("exam_app_notifications", JSON.stringify(notifications));
            render();
            showToast("✓ تم حذف الإشعار");
        }
    }
    
    function addNewNotification() {
        const newId = notifications.length + 1;
        notifications.push({
            id: newId,
            title: "✏️ إشعار جديد",
            content: "اكتب نص الإشعار هنا..."
        });
        localStorage.setItem("exam_app_notifications", JSON.stringify(notifications));
        render();
        showToast("✓ تم إضافة إشعار جديد");
    }

    function render() {
        const container = document.getElementById("notificationsContainer");
        if (!container) return;
        container.innerHTML = "";
        
        notifications.forEach((notif) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-title">
                    <i class="fas fa-pen" style="color: #2a5a82;"></i>
                </div>
                <input type="text" id="title-${notif.id}" value="${escapeHtml(notif.title)}" placeholder="عنوان الإشعار">
                <textarea id="content-${notif.id}" rows="3" placeholder="نص الإشعار">${escapeHtml(notif.content)}</textarea>
                <div class="button-group">
                    <button class="save-single" data-id="${notif.id}"><i class="fas fa-save"></i> حفظ</button>
                    <button class="delete-btn" data-id="${notif.id}"><i class="fas fa-trash"></i> حذف</button>
                </div>
            `;
            container.appendChild(card);
        });
        
        // زر إضافة إشعار جديد
        const addBtn = document.createElement("button");
        addBtn.className = "save-all-btn";
        addBtn.style.background = "#17a2b8";
        addBtn.innerHTML = '<i class="fas fa-plus"></i> إضافة إشعار جديد';
        addBtn.onclick = addNewNotification;
        container.appendChild(addBtn);
        
        // زر حفظ الكل
        const saveAllBtn = document.createElement("button");
        saveAllBtn.className = "save-all-btn";
        saveAllBtn.innerHTML = '<i class="fas fa-save"></i> حفظ جميع التغييرات';
        saveAllBtn.onclick = saveAllChanges;
        container.appendChild(saveAllBtn);
        
        // ربط أزرار الحفظ الفردية
        document.querySelectorAll('.save-single').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const newTitle = document.getElementById(`title-${id}`).value;
                const newContent = document.getElementById(`content-${id}`).value;
                const index = notifications.findIndex(n => n.id === id);
                if (index !== -1) {
                    notifications[index].title = newTitle;
                    notifications[index].content = newContent;
                    localStorage.setItem("exam_app_notifications", JSON.stringify(notifications));
                    showToast("✓ تم حفظ هذا الإشعار");
                }
            });
        });
        
        // ربط أزرار الحذف
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                deleteNotification(id);
            });
        });
    }

    loadData();
</script>
</body>
</html>
