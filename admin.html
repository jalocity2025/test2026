<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>إشعارات الاختبارات - النظام السحابي</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Tajawal','Segoe UI',sans-serif;background:#f4f6f9;padding:16px;direction:rtl}
  .header{background:#0056b3;color:#fff;padding:18px;border-radius:20px;text-align:center;margin-bottom:20px}
  .header h2{font-size:1.4rem;margin-bottom:8px}
  .badge{background:#ffc107;padding:6px 16px;border-radius:40px;font-size:13px;font-weight:bold;display:inline-block}
  .card{background:#fff;padding:16px;margin:12px 0;border-radius:18px;border-right:5px solid #0056b3;box-shadow:0 3px 8px rgba(0,0,0,0.08);transition:0.2s}
  .card h3{color:#0056b3;margin-bottom:10px;font-size:1.2rem;word-break:break-word}
  .card p{color:#333;line-height:1.5;font-size:0.95rem;word-break:break-word}
  .editable{background:#fff9c4;border:2px dashed #f9a825;padding:8px;border-radius:14px;outline:none;cursor:text}
  .editable:focus{background:#fff3b0}
  .btn{display:block;width:100%;padding:14px;margin:10px 0;border:none;border-radius:50px;font-size:1rem;font-weight:bold;cursor:pointer;transition:0.2s;text-align:center;touch-action:manipulation}
  .btn:active{transform:scale(0.97);opacity:0.9}
  .btn-blue{background:#00acc1}
  .btn-green{background:#2e7d32}
  .btn-gray{background:#616161}
  .del-btn{background:#c62828;padding:10px;margin-top:12px}
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10000;justify-content:center;align-items:center;backdrop-filter:blur(3px)}
  .modal-box{background:#fff;padding:24px;border-radius:28px;width:85%;max-width:340px;text-align:center}
  .modal-box input{width:100%;padding:14px;margin:18px 0;border:2px solid #ddd;border-radius:40px;font-size:1.2rem;text-align:center}
  .error{color:#d32f2f;font-size:13px;display:none;margin:5px 0}
  .footer{text-align:center;color:#888;font-size:11px;margin-top:25px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:40px;font-size:14px;z-index:11000;opacity:0;transition:0.3s;pointer-events:none}
  .loading{text-align:center;padding:40px;color:#0056b3}
</style>
</head>
<body>

<div class="header">
  <h2>📢 نظام الإشعارات - الاختبارات</h2>
  <span class="badge" id="badge">جاري التحميل...</span>
</div>

<div id="list"><div class="loading">⏳ جلب الإشعارات من السحاب...</div></div>

<button id="loginBtn" class="btn btn-blue">🔐 الدخول لوضع التعديل (للمعلم)</button>
<button id="saveBtn" class="btn btn-green" style="display:none">💾 حفظ التغييرات للسحاب (لجميع الطلاب)</button>
<button id="addBtn" class="btn btn-green" style="display:none">➕ إضافة إشعار جديد</button>
<button id="exitBtn" class="btn btn-gray" style="display:none">🔓 الخروج من وضع التعديل</button>

<div class="footer">✅ الإشعارات مخزنة سحابياً - تظهر فوراً لجميع الطلاب</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>🔐 كلمة المرور</h3>
    <p style="margin:8px 0">للدخول إلى وضع التعديل (للمعلم)</p>
    <input type="password" id="pwd" placeholder="12345" inputmode="numeric">
    <p class="error" id="err">❌ كلمة المرور غير صحيحة</p>
    <button id="confirmBtn" class="btn btn-blue">تأكيد</button>
    <button id="cancelBtn" class="btn btn-gray">إلغاء</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // إعدادات Firebase الخاصة بمشروعك
  const firebaseConfig = {
    apiKey: "AIzaSyCwEe57wyZVqPKfH8bhvAj9d50QiBYj39s",
    authDomain: "lessons-65787.firebaseapp.com",
    databaseURL: "https://lessons-65787-default-rtdb.firebaseio.com",
    projectId: "lessons-65787",
    storageBucket: "lessons-65787.firebasestorage.app",
    messagingSenderId: "717657000730",
    appId: "1:717657000730:web:e3587df694dad7779ebaa3",
    measurementId: "G-G3YZPYB3W1"
  };

  // تهيئة Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const notifsRef = database.ref('notifications');

  let admin = false;
  let localData = [];

  const $ = id => document.getElementById(id);
  const listEl = $('list');
  const badgeEl = $('badge');
  const modalEl = $('modal');
  const pwdEl = $('pwd');
  const errEl = $('err');

  function showToast(msg, isError = false) {
    const toast = $('toast');
    toast.textContent = msg;
    toast.style.backgroundColor = isError ? '#c62828' : '#2e7d32';
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2500);
  }

  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  function render() {
    if (!localData.length) {
      listEl.innerHTML = '<p style="text-align:center;padding:40px;color:#888">📭 لا توجد إشعارات</p>';
    } else {
      listEl.innerHTML = localData.map((item, idx) => `
        <div class="card" data-idx="${idx}">
          <h3 class="${admin ? 'editable' : ''}" ${admin ? 'contenteditable="true"' : ''}>${escapeHtml(item.title)}</h3>
          <p class="${admin ? 'editable' : ''}" ${admin ? 'contenteditable="true"' : ''}>${escapeHtml(item.content)}</p>
          ${admin ? `<button class="btn del-btn" data-idx="${idx}" style="background:#c62828">🗑️ حذف الإشعار</button>` : ''}
        </div>
      `).join('');
    }
    $('saveBtn').style.display = admin ? 'block' : 'none';
    $('addBtn').style.display = admin ? 'block' : 'none';
    $('exitBtn').style.display = admin ? 'block' : 'none';
    badgeEl.textContent = admin ? '👨‍🏫 وضع المعلم (تعديل سحابي)' : '👩‍🎓 وضع الطالب (قراءة فقط)';
    badgeEl.style.background = admin ? '#d32f2f' : '#ffc107';
    badgeEl.style.color = admin ? '#fff' : '#000';
  }

  function loadFromFirebase() {
    listEl.innerHTML = '<div class="loading">⏳ جلب الإشعارات من السحاب...</div>';
    notifsRef.on('value', (snapshot) => {
      const firebaseData = snapshot.val();
      if (firebaseData && Array.isArray(firebaseData) && firebaseData.length > 0) {
        localData = firebaseData;
      } else {
        const defaultData = [
          { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "احضر معك الكتاب والكراس مهم الكراسه" },
          { id: 2, title: "📊 نتائج الاختبار التجريبي", content: "تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%." },
          { id: 3, title: "⏳ موعد التسليم", content: "آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025." }
        ];
        if (!firebaseData || firebaseData.length === 0) {
          notifsRef.set(defaultData).catch(err => showToast("خطأ في الكتابة الأولى", true));
        }
        localData = defaultData;
      }
      render();
      showToast("✅ تم تحديث الإشعارات من السحاب");
    }, (error) => {
      console.error(error);
      listEl.innerHTML = '<p style="color:red;text-align:center">⚠️ فشل الاتصال بقاعدة البيانات</p>';
      showToast("❌ لا يمكن الاتصال بالسحاب", true);
    });
  }

  function saveToFirebase() {
    if (!admin) return;
    const cards = document.querySelectorAll('.card');
    cards.forEach((card, idx) => {
      if (localData[idx]) {
        localData[idx].title = card.querySelector('h3').innerText.trim() || "بدون عنوان";
        localData[idx].content = card.querySelector('p').innerText.trim() || "بدون محتوى";
      }
    });
    notifsRef.set(localData)
      .then(() => showToast("💾 تم حفظ الإشعارات في السحاب وجميع الطلاب سيرونها"))
      .catch(err => showToast("❌ فشل الحفظ: " + err.message, true));
  }

  function addNotification() {
    localData.unshift({
      id: Date.now(),
      title: "✏️ عنوان جديد",
      content: "اكتب محتوى الإشعار هنا..."
    });
    notifsRef.set(localData).then(() => {
      render();
      setTimeout(() => {
        const firstCard = listEl.querySelector('.card');
        if(firstCard && firstCard.querySelector('h3')) firstCard.querySelector('h3').focus();
      }, 150);
    }).catch(err => showToast("خطأ في الإضافة", true));
  }

  function deleteNotification(idx) {
    if (confirm('⚠️ هل أنت متأكد من حذف هذا الإشعار نهائياً؟ سيختفي من جميع الطلاب.')) {
      localData.splice(idx, 1);
      notifsRef.set(localData).catch(err => showToast("خطأ في الحذف", true));
    }
  }

  // أحداث الأزرار
  $('loginBtn').onclick = () => {
    modalEl.style.display = 'flex';
    pwdEl.value = '';
    errEl.style.display = 'none';
    setTimeout(() => pwdEl.focus(), 100);
  };
  $('cancelBtn').onclick = () => modalEl.style.display = 'none';
  modalEl.onclick = (e) => { if(e.target === modalEl) modalEl.style.display = 'none'; };
  
  function checkPassword() {
    if (pwdEl.value.trim() === "12345") {
      admin = true;
      modalEl.style.display = 'none';
      render();
    } else {
      errEl.style.display = 'block';
    }
  }
  $('confirmBtn').onclick = checkPassword;
  pwdEl.onkeypress = (e) => { if(e.key === 'Enter') checkPassword(); };
  
  $('saveBtn').onclick = saveToFirebase;
  $('addBtn').onclick = addNotification;
  $('exitBtn').onclick = () => { if(confirm('الخروج من وضع المعلم؟')) { admin = false; render(); } };
  
  // حذف باستخدام delegation
  listEl.addEventListener('click', (e) => {
    const delBtn = e.target.closest('.del-btn');
    if(delBtn && admin) {
      const idx = parseInt(delBtn.getAttribute('data-idx'), 10);
      deleteNotification(idx);
    }
  });
  
  // منع لصق HTML داخل الحقول القابلة للتحرير
  document.addEventListener('paste', (e) => {
    if(!admin) return;
    const target = e.target;
    if(target.isContentEditable) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    }
  });
  
  // بدء التحميل
  loadFromFirebase();
</script>
</body>
</html>
