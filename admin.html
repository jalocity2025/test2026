
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>إشعارات الاختبارات</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',Tahoma,sans-serif;background:#f4f6f9;padding:20px;direction:rtl}
  .header{background:#0056b3;color:#fff;padding:20px;border-radius:15px;text-align:center;margin-bottom:20px}
  .header h2{font-size:20px;margin-bottom:10px}
  .badge{background:#ffc107;color:#000;padding:6px 14px;border-radius:15px;font-size:13px;font-weight:bold;display:inline-block}
  .card{background:#fff;padding:15px;margin:12px 0;border-radius:12px;border-right:4px solid #0056b3;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
  .card h3{color:#0056b3;margin-bottom:8px;font-size:17px}
  .card p{color:#555;line-height:1.6;font-size:15px}
  .editable{background:#fff9c4;border:2px dashed #fbc02d;padding:8px;border-radius:8px;outline:none}
  .btn{display:block;width:100%;padding:14px;margin:8px 0;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;color:#fff;touch-action:manipulation}
  .btn-blue{background:#00acc1}.btn-green{background:#2e7d32}.btn-gray{background:#757575}
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;justify-content:center;align-items:center}
  .modal-box{background:#fff;padding:25px;border-radius:15px;width:90%;max-width:350px;text-align:center}
  .modal input{width:100%;padding:12px;margin:15px 0;border:2px solid #ddd;border-radius:10px;font-size:18px;text-align:center}
  .error{color:#f44336;font-size:13px;display:none;margin:10px 0}
</style>
</head>
<body>

<div class="header">
  <h2>📢 نظام الإشعارات - الاختبارات</h2>
  <span class="badge" id="badge">وضع الطالب (عرض فقط)</span>
</div>

<div id="list"></div>

<button id="loginBtn" class="btn btn-blue">🔐 الدخول لوضع التعديل (للمعلم)</button>
<button id="saveBtn" class="btn btn-green" style="display:none">💾 حفظ جميع التغييرات</button>
<button id="addBtn" class="btn btn-green" style="display:none">➕ إضافة إشعار جديد</button>
<button id="exitBtn" class="btn btn-gray" style="display:none">🔓 الخروج من وضع التعديل</button>

<p style="text-align:center;color:#888;font-size:12px;margin-top:25px">متوافق مع الجوال - محمد عيادة 2026</p>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>🔐 أدخل كلمة المرور</h3>
    <p style="color:#666;margin:10px 0">للدخول إلى وضع التعديل</p>
    <input type="password" id="pwd" placeholder="كلمة المرور..." inputmode="numeric">
    <p class="error" id="err">❌ كلمة المرور غير صحيحة</p>
    <button id="confirmBtn" class="btn btn-blue">دخول</button>
    <button id="cancelBtn" class="btn btn-gray">إلغاء</button>
  </div>
</div>

<script>
(function(){
  const PASS="12345";
  let admin=false;
  
  // تحميل آمن للبيانات مع fallback
  let data;
  try{ data=JSON.parse(localStorage.getItem('notifs')) || []; }
  catch(e){ data=[]; }
  if(data.length===0){
    data=[
      {id:1,title:"📢 تذكير: اختبار منتصف الفصل",content:"احضر معك الكتاب والكراس مهم الكراسه"},
      {id:2,title:"📊 نتائج الاختبار التجريبي",content:"تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%."},
      {id:3,title:"⏳ موعد التسليم",content:"آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025."}
    ];
  }

  const $=id=>document.getElementById(id);
  const listEl=$('list'), badgeEl=$('badge'), modalEl=$('modal');
  const pwdEl=$('pwd'), errEl=$('err');

  function render(){
    if(data.length===0){
      listEl.innerHTML='<p style="text-align:center;padding:30px;color:#888">لا توجد إشعارات</p>';
    }else{
      listEl.innerHTML=data.map((item,i)=>`
        <div class="card" data-idx="${i}">
          <h3 class="${admin?'editable':''}" ${admin?'contenteditable="true"':''}>${item.title}</h3>
          <p class="${admin?'editable':''}" ${admin?'contenteditable="true"':''}>${item.content}</p>
          ${admin?`<button class="btn btn-gray del-btn" data-idx="${i}" style="padding:10px;margin-top:10px">🗑️ حذف</button>`:''}
        </div>
      `).join('');
    }
    $('saveBtn').style.display=admin?'block':'none';
    $('addBtn').style.display=admin?'block':'none';
    $('exitBtn').style.display=admin?'block':'none';
    badgeEl.textContent=admin?'وضع المعلم (تعديل مفعل)':'وضع الطالب (عرض فقط)';
    badgeEl.style.background=admin?'#f44336':'#ffc107';
    badgeEl.style.color=admin?'#fff':'#000';
  }

  // ربط الأحداث بشكل آمن للموبايل
  $('loginBtn').addEventListener('click',()=>{
    modalEl.style.display='flex';
    pwdEl.value=''; errEl.style.display='none';
    setTimeout(()=>pwdEl.focus(),200);
  });

  $('cancelBtn').addEventListener('click',()=>{ modalEl.style.display='none'; });
  modalEl.addEventListener('click',e=>{ if(e.target===modalEl) modalEl.style.display='none'; });

  $('confirmBtn').addEventListener('click',checkPass);
  pwdEl.addEventListener('keypress',e=>{ if(e.key==='Enter') checkPass(); });

  function checkPass(){
    const val=pwdEl.value.trim();
    if(val===PASS){
      admin=true; modalEl.style.display='none'; render();
    }else{ errEl.style.display='block'; }
  }

  $('saveBtn').addEventListener('click',()=>{
    // تحديث البيانات من الحقول القابلة للتعديل
    document.querySelectorAll('.card').forEach((card,i)=>{
      data[i].title=card.querySelector('h3').innerText.trim();
      data[i].content=card.querySelector('p').innerText.trim();
    });
    try{ localStorage.setItem('notifs',JSON.stringify(data)); }catch(e){}
    alert('✅ تم حفظ التغييرات بنجاح!');
  });

  $('addBtn').addEventListener('click',()=>{
    data.unshift({id:Date.now(),title:"عنوان إشعار جديد",content:"اكتب محتوى الإشعار هنا..."});
    render();
    setTimeout(()=>{
      const first=listEl.querySelector('.card');
      if(first){ first.scrollIntoView({behavior:'smooth',block:'center'}); first.querySelector('h3').focus(); }
    },150);
  });

  listEl.addEventListener('click',e=>{
    if(e.target.classList.contains('del-btn')){
      const idx=parseInt(e.target.dataset.idx);
      if(confirm('هل أنت متأكد من حذف هذا الإشعار؟')){
        data.splice(idx,1); render();
      }
    }
  });

  $('exitBtn').addEventListener('click',()=>{
    if(confirm('الخروج من وضع المعلم؟')){ admin=false; render(); }
  });

  render();
})();
</script>
</body>
</html>
