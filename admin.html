
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>إشعارات الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Tajawal, sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #1e4663; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.4rem; }
        .badge { background: #ffc107; color: #333; display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
        .badge.admin { background: #dc3545; color: white; }
        
        .notification-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-right: 4px solid #1e4663; position: relative; }
        .notification-title { font-size: 1.2rem; font-weight: bold; color: #1e4663; margin-bottom: 10px; }
        .notification-content { color: #333; line-height: 1.5; }
        
        /* عناصر التعديل - مخفية افتراضيًا */
        .edit-controls { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ccc; }
        .edit-area { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 12px; font-family: inherit; font-size: 1rem; }
        
        button { background: #28a745; color: white; border: none; padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 14px; margin-left: 8px; }
        button:hover { opacity: 0.9; }
        .btn-danger { background: #dc3545; }
        .btn-secondary { background: #6c757d; }
        .btn-edit-mode { background: #17a2b8; display: block; width: 100%; margin: 20px 0; }
        .btn-save-all { background: #1e4663; width: 100%; padding: 12px; margin-top: 15px; font-size: 16px; display: none; }
        
        .admin-mode .edit-controls { display: block; }
        .admin-mode .notification-title[contenteditable="true"],
        .admin-mode .notification-content[contenteditable="true"] {
            background: #fff9e6; padding: 5px; border-radius: 8px; outline: 2px dashed #ffc107;
        }
        
        footer { text-align: center; margin-top: 30px; font-size: 12px; color: #777; }
        
        /* نافذة كلمة المرور */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ccc; border-radius: 12px; font-size: 1rem; }
        .error-msg { color: #dc3545; font-size: 14px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📢 نظام الإشعارات - الاختبارات</h1>
        <div class="badge" id="modeLabel">وضع الطالب (عرض فقط)</div>
    </div>

    <div id="notificationsList">
        <!-- سيتم توليد الإشعارات ديناميكيًا -->
    </div>

    <button id="toggleModeBtn" class="btn-edit-mode">🔐 الدخول لوضع التعديل (للمعلم)</button>
    <button id="saveAllBtn" class="btn-save-all">💾 حفظ جميع التغييرات</button>
    <button id="addNotificationBtn" class="btn-edit-mode" style="display:none; background:#28a745;">➕ إضافة إشعار جديد</button>

    <footer>متوافق مع الجوال - محمد عيادة 2026</footer>
</div>

<!-- نافذة كلمة المرور -->
<div class="modal" id="passwordModal">
    <div class="modal-content">
        <h3>🔐 أدخل كلمة المرور</h3>
        <p style="color:#666; margin:10px 0">للدخول إلى وضع التعديل</p>
        <input type="password" id="passwordInput" placeholder="كلمة المرور...">
        <div class="error-msg" id="errorMsg">❌ كلمة المرور غير صحيحة</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="checkPassword()">دخول</button>
            <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    // ⚙️ إعدادات النظام
    const ADMIN_PASSWORD = "teacher123"; // ⚠️ غيّر هذه الكلمة في الإنتاج
    let isAdminMode = false;

    // بيانات الإشعارات (يمكن تحميلها من localStorage)
    let notifications = JSON.parse(localStorage.getItem('testNotifications')) || [
        { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "احضر معك الكتاب والكراس مهم الكراسه" },
        { id: 2, title: "📊 نتائج الاختبار التجريبي", content: "تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%. يرجى مراجعة حساباتكم." },
        { id: 3, title: "⚙️ تحديث المنصة", content: "تم إضافة ميزة مراجعة الإجابات بعد الاختبار." },
        { id: 4, title: "⏳ موعد التسليم", content: "آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025." },
        { id: 5, title: "📚 محاضرة مراجعة", content: "محاضرة مراجعة شاملة يوم السبت من 2 إلى 4 مساءً." }
    ];

    // 🎯 عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        renderNotifications();
        setupEventListeners();
    });

    // 🎨 عرض الإشعارات
    function renderNotifications() {
        const list = document.getElementById('notificationsList');
        list.innerHTML = notifications.map(notif => `
            <div class="notification-card" data-id="${notif.id}">
                <div class="notification-title" contenteditable="${isAdminMode}">${notif.title}</div>
                <div class="notification-content" contenteditable="${isAdminMode}">${notif.content}</div>
                
                <div class="edit-controls">
                    <button class="btn-danger" onclick="deleteNotification(${notif.id})">🗑️ حذف</button>
                    <button class="btn-secondary" onclick="resetNotification(${notif.id})">↩️ تراجع</button>
                </div>
            </div>
        `).join('');
        
        // تحديث واجهة المستخدم حسب الوضع
        document.body.classList.toggle('admin-mode', isAdminMode);
        document.getElementById('modeLabel').textContent = isAdminMode ? 'وضع المعلم (تعديل مفعل)' : 'وضع الطالب (عرض فقط)';
        document.getElementById('modeLabel').classList.toggle('admin', isAdminMode);
        document.getElementById('saveAllBtn').style.display = isAdminMode ? 'block' : 'none';
        document.getElementById('addNotificationBtn').style.display = isAdminMode ? 'block' : 'none';
        document.getElementById('toggleModeBtn').textContent = isAdminMode ? '🔓 الخروج من وضع التعديل' : '🔐 الدخول لوضع التعديل (للمعلم)';
    }

    // 🔐 التحقق من كلمة المرور
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');
        
        if (input === ADMIN_PASSWORD) {
            isAdminMode = true;
            closeModal();
            document.getElementById('passwordInput').value = '';
            errorMsg.style.display = 'none';
            renderNotifications();
        } else {
            errorMsg.style.display = 'block';
        }
    }

    function closeModal() {
        document.getElementById('passwordModal').classList.remove('active');
        document.getElementById('passwordInput').value = '';
        document.getElementById('errorMsg').style.display = 'none';
    }

    // 🗑️ حذف إشعار
    function deleteNotification(id) {
        if (confirm('هل أنت متأكد من حذف هذا الإشعار؟')) {
            notifications = notifications.filter(n => n.id !== id);
            renderNotifications();
        }
    }

    // ↩️ تراجع عن التعديل (إعادة تحميل من التخزين)
    function resetNotification(id) {
        const original = JSON.parse(localStorage.getItem('testNotifications')) || [];
        const orig = original.find(n => n.id === id);
        if (orig) {
            const card = document.querySelector(`.notification-card[data-id="${id}"]`);
            card.querySelector('.notification-title').textContent = orig.title;
            card.querySelector('.notification-content').textContent = orig.content;
        }
    }

    // 💾 حفظ التغييرات
    function saveNotifications() {
        const cards = document.querySelectorAll('.notification-card');
        notifications = Array.from(cards).map(card => ({
            id: parseInt(card.dataset.id),
            title: card.querySelector('.notification-title').innerText,
            content: card.querySelector('.notification-content').innerText
        }));
        localStorage.setItem('testNotifications', JSON.stringify(notifications));
        alert('✅ تم حفظ التغييرات بنجاح!');
    }

    // ➕ إضافة إشعار جديد
    function addNewNotification() {
        const newId = Date.now();
        notifications.push({
            id: newId,
            title: "عنوان إشعار جديد",
            content: "اكتب محتوى الإشعار هنا..."
        });
        renderNotifications();
        // تمرير إلى الأسفل وتعديل العنصر الجديد
        setTimeout(() => {
            const newCard = document.querySelector(`.notification-card[data-id="${newId}"]`);
            if (newCard) {
                newCard.scrollIntoView({ behavior: 'smooth' });
                newCard.querySelector('.notification-title').focus();
            }
        }, 100);
    }

    // 🔗 ربط الأحداث
    function setupEventListeners() {
        // زر تبديل الوضع
        document.getElementById('toggleModeBtn').addEventListener('click', () => {
            if (isAdminMode) {
                isAdminMode = false;
                renderNotifications();
            } else {
                document.getElementById('passwordModal').classList.add('active');
            }
        });

        // حفظ التغييرات
        document.getElementById('saveAllBtn').addEventListener('click', saveNotifications);

        // إضافة إشعار
        document.getElementById('addNotificationBtn').addEventListener('click', addNewNotification);

        // إغلاق النافذة عند الضغط خارجها
        document.getElementById('passwordModal').addEventListener('click', (e) => {
            if (e.target.id === 'passwordModal') closeModal();
        });

        // دعم مفتاح Enter في حقل كلمة المرور
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    }
</script>
</body>
</html>
