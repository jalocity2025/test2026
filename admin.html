<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>
<style>
body{font-family:Tahoma,sans-serif;background:#f5f5f5;padding:20px;margin:0}
.header{background:#0056b3;color:white;padding:20px;border-radius:15px;text-align:center;margin-bottom:20px}
.badge{background:#ffc107;color:black;padding:5px 15px;border-radius:15px;font-size:12px}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;border-right:4px solid #0056b3}
.editable{background:#fff9c4;border:2px dashed orange;padding:5px}
.btn{display:block;width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;font-size:16px;color:white;cursor:pointer}
.blue{background:#00acc1}
.green{background:#2e7d32}
.gray{background:#757575}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;justify-content:center;align-items:center}
.modal-box{background:white;padding:25px;border-radius:15px;width:90%;max-width:350px;text-align:center}
.modal input{width:100%;padding:12px;margin:15px 0;border:2px solid #ddd;border-radius:8px;font-size:18px}
</style>
</head>
<body>

<div class="header">
<h2>📢 إشعارات الاختبارات</h2>
<span class="badge" id="badge">وضع الطالب</span>
</div>

<div id="list"></div>

<button class="btn blue" onclick="openModal()">🔐 دخول المعلم</button>
<button class="btn green" id="saveBtn" style="display:none" onclick="save()">💾 حفظ</button>
<button class="btn green" id="addBtn" style="display:none" onclick="add()">➕ إضافة</button>
<button class="btn gray" id="exitBtn" style="display:none" onclick="exit()">🔓 خروج</button>

<div class="modal" id="modal">
<div class="modal-box">
<h3>🔐 كلمة المرور</h3>
<input type="password" id="pwd" placeholder="أدخل 12345">
<p id="err" style="color:red;display:none">❌ خطأ</p>
<button class="btn blue" onclick="check()">دخول</button>
<button class="btn gray" onclick="closeModal()">إلغاء</button>
</div>
</div>

<script>
const PASS="12345";
let admin=false;
let data=JSON.parse(localStorage.getItem('n')||'null')||[
{t:"تذكير اختبار",c:"احضر الكتاب والكراس"},
{t:"نتائج الاختبار",c:"النجاح 70%"}
];

function show(){
var h='';
if(data.length===0){h='<p style="text-align:center;color:#888;padding:20px">لا توجد إشعارات</p>';}
else{
for(var i=0;i<data.length;i++){
h+='<div class="card"><div class="'+(admin?'editable':'')+'" '+(admin?'contenteditable="true"':'')+' oninput="data['+i+'].t=this.innerText"><b>'+data[i].t+'</b></div><div class="'+(admin?'editable':'')+'" '+(admin?'contenteditable="true"':'')+' oninput="data['+i+'].c=this.innerText" style="margin-top:8px">'+data[i].c+'</div>';
if(admin){h+='<button class="btn gray" style="padding:8px;margin-top:10px" onclick="del('+i+')">🗑️ حذف</button>';}
h+='</div>';
}
}
document.getElementById('list').innerHTML=h;
document.getElementById('saveBtn').style.display=admin?'block':'none';
document.getElementById('addBtn').style.display=admin?'block':'none';
document.getElementById('exitBtn').style.display=admin?'block':'none';
var b=document.getElementById('badge');
b.textContent=admin?'وضع المعلم':'وضع الطالب';
b.style.background=admin?'red':'#ffc107';
}

function openModal(){
document.getElementById('modal').style.display='flex';
document.getElementById('pwd').value='';
document.getElementById('err').style.display='none';
setTimeout(function(){document.getElementById('pwd').focus();},200);
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function check(){
var v=document.getElementById('pwd').value;
if(v===PASS){admin=true;closeModal();show();}
else{document.getElementById('err').style.display='block';}
}

function save(){
localStorage.setItem('n',JSON.stringify(data));
alert('✅ تم الحفظ');
}

function add(){
data.unshift({t:"عنوان جديد",c:"اكتب هنا..."});
show();
}

function del(i){
if(confirm('حذف؟')){data.splice(i,1);show();}
}

function exit(){admin=false;show();}

document.getElementById('pwd').onkeypress=function(e){if(e.key==='Enter')check();};

show();
</script>

</body>
</html>
