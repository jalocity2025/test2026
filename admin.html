<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>إشعارات نظام الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        /* === الحل الأساسي لمشكلة التمرير على الموبايل === */
        html {
            height: 100%;
            overflow-y: scroll !important;
            -webkit-overflow-scrolling: touch;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f5f7fb;
            padding: 15px;
            direction: rtl;
            min-height: 100%;
            height: auto;
            overflow-y: visible;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            display: block;
            width: 100%;
        }
        
        .header {
            background: linear-gradient(135deg, #1e4663, #2a5a82);
            color: white;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.3rem;
            margin: 5px 0;
        }
        
        .mode-badge {
            display: inline-block;
            background: #17a2b8;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .notifications-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-right: 5px solid #2a5a82;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e4663;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-content {
            color: #2c3e50;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        footer {
            text-align: center;
            margin-top: 35px;
            color: #7f8c8d;
            font-size: 12px;
            padding: 15px 0 10px;
            clear: both;
            position: relative;
        }
        
        /* للشاشات المتوسطة والكبيرة */
        @media (min-width: 700px) {
            .notifications-grid {
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            }
            body {
                padding: 25px;
            }
        }
        
        /* تحسين اللمس على الموبايل */
        .card {
            cursor: pointer;
        }
        
        /* جعل الصفحة قابلة للتمرير بشكل مؤكد */
        body, html {
            overflow-x: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> ثانوية صلاح الدين جالو</h1>
        <h1><i class="fas fa-bullhorn"></i> نظام الإشعارات - الاختبارات</h1>
        <div class="mode-badge" id="modeBadge">
            <i class="fas fa-eye"></i> وضع الطالب (عرض فقط)
        </div>
    </div>

    <div class="notifications-grid" id="notificationsContainer">
        <!-- الإشعارات ستظهر هنا -->
    </div>
    
    <footer>
        <i class="fas fa-mobile-alt"></i> متوافق مع جميع الأجهزة - محمد عيادة 2026
    </footer>
</div>

<script>
    // البيانات الافتراضية للإشعارات (وضع الطالب - عرض فقط)
    let notifications = [
        { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "موعد اختبار منتصف الفصل لمادة قواعد البيانات: الأربعاء القادم الساعة 10 صباحاً." },
        { id: 2, title: "📊 نتائج الاختبار التجريبي", content: "تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%. يرجى مراجعة حساباتكم." },
        { id: 3, title: "⚙️ تحديث المنصة", content: "تم إضافة ميزة مراجعة الإجابات بعد الاختبار. نوصي بتحديث التطبيق." },
        { id: 4, title: "⏳ موعد التسليم", content: "آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025." },
        { id: 5, title: "📚 محاضرة مراجعة", content: "محاضرة مراجعة شاملة يوم السبت من 2 إلى 4 مساءً (قاعة A101)." }
    ];
    
    // عرض الإشعارات بشكل جميل
    function renderNotifications() {
        const container = document.getElementById("notificationsContainer");
        if (!container) return;
        
        container.innerHTML = "";
        
        notifications.forEach((notif, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-title">
                    <i class="fas fa-bell" style="color: #2a5a82;"></i>
                    ${escapeHtml(notif.title)}
                </div>
                <div class="card-content">
                    ${escapeHtml(notif.content)}
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // تحميل أي بيانات محفوظة (إذا وجدت)
    function loadData() {
        const stored = localStorage.getItem("exam_app_notifications");
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    notifications = parsed;
                }
            } catch(e) {}
        }
        renderNotifications();
    }
    
    loadData();
</script>
</body>
</html>
