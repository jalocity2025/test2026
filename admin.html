<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- هذا السطر هو مفتحل حل مشاكل العرض على الموبايل -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إشعارات الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* إعدادات أساسية لضبط الصفحة على الجوال */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: #f4f6f9; color: #333; padding-bottom: 50px; }
        
        /* الحاوية الرئيسية */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* رأس الصفحة */
        .header {
            background: linear-gradient(135deg, #0056b3, #004494);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 20px; margin-bottom: 10px; }
        .badge {
            background: #ffc107; color: #000; padding: 5px 15px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            display: inline-block;
        }

        /* بطاقة الإشعار */
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-right: 4px solid #0056b3;
        }
        .card h3 { font-size: 16px; color: #0056b3; margin-bottom: 8px; }
        .card p { font-size: 14px; line-height: 1.6; color: #555; }

        /* تنسيق وضع التعديل */
        .edit-mode .card h3, .edit-mode .card p {
            background: #fff9c4; /* خلفية صفراء خفيفة لتمييز القابل للتعديل */
            border: 1px dashed #fbc02d;
            padding: 8px;
            border-radius: 8px;
            outline: none;
            min-height: 30px;
        }
        .edit-mode .card h3:focus, .edit-mode .card p:focus {
            border-color: #0056b3;
            background: #fff;
        }

        /* الأزرار */
        .btn {
            display: block; width: 100%; padding: 15px;
            border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; font-family: 'Tajawal', sans-serif;
            cursor: pointer; text-align: center; margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        
        .btn-login { background: #00acc1; color: white; }
        .btn-save { background: #2e7d32; color: white; display: none; }
        .btn-add { background: #ff9800; color: white; display: none; }
        .btn-exit { background: #757575; color: white; display: none; }
        
        .delete-btn {
            background: #ef5350; color: white; border: none;
            padding: 5px 10px; border-radius: 5px; font-size: 12px;
            margin-top: 10px; display: none;
        }

        /* النافذة المنبثقة */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center;
        }
        .modal input {
            width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd;
            border-radius: 8px; font-size: 16px; text-align: center;
        }
        .error { color: red; font-size: 12px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <!-- الرأس -->
    <div class="header">
        <h1>📢 نظام الإشعارات - الاختبارات</h1>
        <span class="badge" id="modeBadge">وضع الطالب (عرض فقط)</span>
    </div>

    <!-- قائمة الإشعارات (ستظهر هنا) -->
    <div id="notificationsArea"></div>

    <!-- الأزرار الرئيسية -->
    <button class="btn btn-login" id="loginBtn" onclick="showLoginModal()">🔐 الدخول لوضع التعديل (للمعلم)</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveChanges()">💾 حفظ التغييرات</button>
    <button class="btn btn-add" id="addBtn" onclick="addNewNotification()">➕ إضافة إشعار جديد</button>
    <button class="btn btn-exit" id="exitBtn" onclick="exitEditMode()">🔓 خروج من وضع التعديل</button>
    
    <p style="text-align:center; color:#888; font-size:12px; margin-top:20px;">متوافق مع الجوال - محمد عيادة 2026</p>
</div>

<!-- نافذة كلمة المرور -->
<div class="modal" id="passwordModal">
    <div class="modal-box">
        <h3>🔐 كلمة مرور المعلم</h3>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور..." inputmode="numeric">
        <p class="error" id="passError">❌ كلمة المرور خطأ</p>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-login" style="margin:0" onclick="verifyPassword()">دخول</button>
            <button class="btn btn-exit" style="margin:0; display:block;" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    // 1. إعداد البيانات
    const TEACHER_PASS = "teacher123";
    let isAdmin = false;
    
    // بيانات افتراضية تظهر دائماً في حال عدم وجود بيانات محفوظة
    const defaultData = [
        { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "احضر معك الكتاب والكراس، الكراس مهم جداً" },
        { id: 2, title: "📊 نتائج الاختبار التجريبي", content: "تم إعلان النتائج. درجة النجاح 70%." },
        { id: 3, title: "📅 موعد التسليم", content: "آخر موعد للتسجيل هو 20 أبريل." }
    ];

    // تحميل البيانات من الذاكرة أو استخدام الافتراضي
    let notifications = JSON.parse(localStorage.getItem('testNotifs')) || defaultData;

    // 2. دالة رسم الإشعارات (تعمل دائماً)
    function render() {
        const area = document.getElementById('notificationsArea');
        area.innerHTML = ''; // مسح القائمة الحالية

        if (notifications.length === 0) {
            area.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">لا توجد إشعارات</p>';
        } else {
            notifications.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                // نستخدم contenteditable فقط إذا كنا في وضع المعلم
                const editableAttr = isAdmin ? 'contenteditable="true"' : '';
                
                card.innerHTML = `
                    <h3 ${editableAttr} oninput="updateData(${index}, 'title', this.innerText)">${item.title}</h3>
                    <p ${editableAttr} oninput="updateData(${index}, 'content', this.innerText)">${item.content}</p>
                    ${isAdmin ? `<button class="delete-btn" style="display:inline-block" onclick="deleteItem(${index})">🗑️ حذف</button>` : ''}
                `;
                area.appendChild(card);
            });
        }
        updateUI();
    }

    // 3. تحديث الواجهة (إظهار/إخفاء الأزرار)
    function updateUI() {
        const container = document.getElementById('mainContainer');
        const badge = document.getElementById('modeBadge');
        
        if (isAdmin) {
            container.classList.add('edit-mode');
            badge.textContent = 'وضع المعلم (تعديل)';
            badge.style.background = '#ef5350';
            badge.style.color = '#fff';
            
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'block';
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('exitBtn').style.display = 'block';
        } else {
            container.classList.remove('edit-mode');
            badge.textContent = 'وضع الطالب (عرض فقط)';
            badge.style.background = '#ffc107';
            badge.style.color = '#000';
            
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('saveBtn').style.display = 'none';
            document.getElementById('addBtn').style.display = 'none';
            document.getElementById('exitBtn').style.display = 'none';
        }
    }

    // 4. التحكم في النافذة
    function showLoginModal() {
        document.getElementById('passwordModal').classList.add('open');
        document.getElementById('passInput').value = '';
        document.getElementById('passError').style.display = 'none';
        document.getElementById('passInput').focus();
    }
    
    function closeModal() {
        document.getElementById('passwordModal').classList.remove('open');
    }

    // 5. التحقق من كلمة المرور
    function verifyPassword() {
        const input = document.getElementById('passInput').value.trim();
        if (input === TEACHER_PASS) {
            isAdmin = true;
            closeModal();
            render(); // إعادة رسم الصفحة بوضع التعديل
        } else {
            document.getElementById('passError').style.display = 'block';
        }
    }

    // 6. وظائف التعديل (تحديث البيانات فورياً عند الكتابة)
    function updateData(index, field, value) {
        notifications[index][field] = value;
    }

    function deleteItem(index) {
        if(confirm('هل تريد حذف هذا الإشعار؟')) {
            notifications.splice(index, 1);
            render();
        }
    }

    function addNewNotification() {
        notifications.unshift({ id: Date.now(), title: "إشعار جديد", content: "اكتب المحتوى هنا..." });
        render();
    }

    function saveChanges() {
        localStorage.setItem('testNotifs', JSON.stringify(notifications));
        alert('✅ تم الحفظ بنجاح!');
        exitEditMode();
    }

    function exitEditMode() {
        if(confirm('الخروج من وضع المعلم؟')) {
            isAdmin = false;
            render(); // إعادة الرسم لوضع الطالب (إزالة حقول الكتابة)
        }
    }

    // تشغيل الدالة عند فتح الصفحة
    render();
</script>

</body>
</html>
