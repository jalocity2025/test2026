<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Notifications</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f4f6f9}
.header{background:#0056b3;color:#fff;padding:20px;border-radius:15px;text-align:center;margin-bottom:20px}
.badge{background:#ffc107;color:#000;padding:5px 12px;border-radius:15px;font-size:12px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:12px;border-right:4px solid #0056b3}
.editable{background:#fff9c4;border:1px dashed #fbc02d;padding:5px}
.btn{display:block;width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;font-size:16px;color:#fff}
.btn-blue{background:#00acc1}.btn-green{background:#2e7d32}.btn-gray{background:#757575}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:25px;border-radius:15px;width:90%;max-width:350px;text-align:center}
.modal input{width:100%;padding:12px;margin:15px 0;border:2px solid #ddd;border-radius:8px;font-size:18px}
</style>
</head>
<body>

<div class="header">
<h2>📢 إشعارات الاختبارات</h2>
<span class="badge" id="badge">وضع الطالب</span>
</div>

<div id="list"></div>

<button class="btn btn-blue" onclick="openModal()">🔐 دخول المعلم</button>
<button class="btn btn-green" id="saveBtn" style="display:none" onclick="saveData()">💾 حفظ</button>
<button class="btn btn-green" id="addBtn" style="display:none" onclick="addNotif()">➕ إضافة</button>
<button class="btn btn-gray" id="exitBtn" style="display:none" onclick="exitMode()">🔓 خروج</button>

<div class="modal" id="modal">
<div class="modal-content">
<h3>🔐 كلمة المرور</h3>
<input type="password" id="pwd" placeholder="أدخل *****">
<p id="err" style="color:red;display:none">❌ خطأ</p>
<button class="btn btn-blue" onclick="check()">دخول</button>
<button class="btn btn-gray" onclick="closeModal()">إلغاء</button>
</div>
</div>

<script>
// === الإعدادات ===
const PASS = "2026";
let admin = false;
let data = JSON.parse(localStorage.getItem('notifs')||'null') || [
  {t:"عنوان 1",c:"محتوى الإشعار الأول"},
  {t:"عنوان 2",c:"محتوى الإشعار الثاني"}
];

// === عرض الإشعارات ===
function show(){
  const list = document.getElementById('list');
  list.innerHTML = data.map((item,i)=>`
    <div class="card">
      <div class="${admin?'editable':''}" ${admin?'contenteditable="true"':''} 
           oninput="data[${i}].t=this.innerText">${item.t}</div>
      <div class="${admin?'editable':''}" ${admin?'contenteditable="true"':''}
           oninput="data[${i}].c=this.innerText" style="margin-top:8px">${item.c}</div>
      ${admin?`<button class="btn btn-gray" style="padding:8px;margin-top:10px" onclick="del(${i})">🗑️ حذف</button>`:''}
    </div>`).join('') || '<p style="text-align:center;color:#888">لا توجد إشعارات</p>';
  
  document.getElementById('saveBtn').style.display = admin?'block':'none';
  document.getElementById('addBtn').style.display = admin?'block':'none';
  document.getElementById('exitBtn').style.display = admin?'block':'none';
  document.getElementById('badge').textContent = admin?'وضع المعلم':'وضع الطالب';
  document.getElementById('badge').style.background = admin?'#ef5350':'#ffc107';
}

// === النافذة ===
function openModal(){
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('pwd').value = '';
  document.getElementById('err').style.display = 'none';
  setTimeout(()=>document.getElementById('pwd').focus(),200);
}
function closeModal(){document.getElementById('modal').style.display='none';}

// === التحقق من كلمة المرور ===
function check(){
  const val = document.getElementById('pwd').value;
  // Debug: show what was entered
  if(val === PASS){
    admin = true;
    closeModal();
    show();
  }else{
    document.getElementById('err').style.display = 'block';
    // Show debug alert (remove after testing)
    // alert('Entered: ['+val+'] Expected: ['+PASS+']');
  }
}

// === الوظائف ===
function saveData(){
  localStorage.setItem('notifs', JSON.stringify(data));
  alert('✅ تم الحفظ');
}
function addNotif(){
  data.unshift({t:"عنوان جديد",c:"اكتب هنا..."});
  show();
}
function del(i){
  if(confirm('حذف؟')){data.splice(i,1);show();}
}
function exitMode(){admin=false;show();}

// دعم زر Enter
document.getElementById('pwd').onkeypress = function(e){
  if(e.key==='Enter') check();
};

// تشغيل عند التحميل
show();
</script>
</body>
</html>
