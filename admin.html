<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>إشعارات الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: #1e4663;
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 1.4rem;
        }
        .badge {
            background: #ffc107;
            color: #333;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        .notification-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-right: 4px solid #1e4663;
        }
        .notification-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e4663;
            margin-bottom: 10px;
        }
        .notification-content {
            color: #333;
            line-height: 1.5;
        }
        .edit-area {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }
        .btn-save-all {
            background: #1e4663;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            font-size: 16px;
        }
        .btn-edit-mode {
            background: #17a2b8;
            display: block;
            width: 100%;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📢 نظام الإشعارات - الاختبارات</h1>
        <div class="badge" id="modeLabel">وضع الطالب (عرض فقط)</div>
    </div>

    <div id="notificationsList"></div>

    <button id="toggleModeBtn" class="btn-edit-mode">🔐 الدخول لوضع التعديل (للمعلم)</button>

    <footer>متوافق مع الجوال - محمد عيادة 2026</footer>
</div>

<script>
    // البيانات الافتراضية
    let notifications = [
        { id: 1, title: "📢 تذكير: اختبار منتصف الفصل", content: "موعد اختبار منتصف الفصل لمادة قواعد البيانات: الأربعاء القادم الساعة 10 صباحاً." },
        { id: 2, title: "📊 نتائج الاختبار التجريبي", content: "تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%. يرجى مراجعة حساباتكم." },
        { id: 3, title: "⚙️ تحديث المنصة", content: "تم إضافة ميزة مراجعة الإجابات بعد الاختبار." },
        { id: 4, title: "⏳ موعد التسليم", content: "آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025." },
        { id: 5, title: "📚 محاضرة مراجعة", content: "محاضرة مراجعة شاملة يوم السبت من 2 إلى 4 مساءً." }
    ];

    let isEditMode = false;  // وضع التعديل معطل افتراضياً

    // تحميل البيانات المخزنة
    function loadData() {
        const saved = localStorage.getItem("exam_notif");
        if (saved) {
            try {
                let parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length) notifications = parsed;
            } catch(e) {}
        }
        render();
    }

    function saveData() {
        localStorage.setItem("exam_notif", JSON.stringify(notifications));
    }

    function render() {
        const container = document.getElementById("notificationsList");
        if (!container) return;
        container.innerHTML = "";

        notifications.forEach(notif => {
            const card = document.createElement("div");
            card.className = "notification-card";

            if (isEditMode) {
                // وضع التعديل: حقول editable
                card.innerHTML = `
                    <input type="text" id="title-${notif.id}" value="${escapeHtml(notif.title)}" class="edit-area" placeholder="العنوان">
                    <textarea id="content-${notif.id}" rows="3" class="edit-area" placeholder="المحتوى">${escapeHtml(notif.content)}</textarea>
                    <button onclick="saveSingle(${notif.id})">💾 حفظ هذا</button>
                    <button onclick="deleteNotif(${notif.id})" style="background:#dc3545;">🗑 حذف</button>
                `;
            } else {
                // وضع العرض فقط
                card.innerHTML = `
                    <div class="notification-title">${escapeHtml(notif.title)}</div>
                    <div class="notification-content">${escapeHtml(notif.content)}</div>
                `;
            }
            container.appendChild(card);
        });

        if (isEditMode) {
            // زر إضافة جديد
            const addBtn = document.createElement("button");
            addBtn.textContent = "+ إضافة إشعار جديد";
            addBtn.style.background = "#17a2b8";
            addBtn.style.width = "100%";
            addBtn.style.marginTop = "10px";
            addBtn.onclick = addNewNotification;
            container.appendChild(addBtn);

            // زر حفظ الكل
            const saveAllBtn = document.createElement("button");
            saveAllBtn.textContent = "💾 حفظ جميع التغييرات";
            saveAllBtn.className = "btn-save-all";
            saveAllBtn.onclick = saveAllChanges;
            container.appendChild(saveAllBtn);
        }
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.saveSingle = function(id) {
        const newTitle = document.getElementById(`title-${id}`).value;
        const newContent = document.getElementById(`content-${id}`).value;
        const notif = notifications.find(n => n.id === id);
        if (notif) {
            notif.title = newTitle;
            notif.content = newContent;
            saveData();
            render();
            showToast("تم حفظ الإشعار");
        }
    };

    window.deleteNotif = function(id) {
        if (confirm("هل تريد حذف هذا الإشعار؟")) {
            notifications = notifications.filter(n => n.id !== id);
            // إعادة ترقيم المعرفات
            notifications.forEach((n, idx) => n.id = idx + 1);
            saveData();
            render();
            showToast("تم الحذف");
        }
    };

    function addNewNotification() {
        const newId = notifications.length + 1;
        notifications.push({
            id: newId,
            title: "إشعار جديد",
            content: "اكتب النص هنا..."
        });
        saveData();
        render();
        showToast("تمت الإضافة");
    }

    function saveAllChanges() {
        for (let notif of notifications) {
            const titleEl = document.getElementById(`title-${notif.id}`);
            const contentEl = document.getElementById(`content-${notif.id}`);
            if (titleEl && contentEl) {
                notif.title = titleEl.value;
                notif.content = contentEl.value;
            }
        }
        saveData();
        render();
        showToast("تم حفظ جميع التغييرات");
    }

    function showToast(msg) {
        let toast = document.getElementById("toastMsg");
        if (!toast) {
            toast = document.createElement("div");
            toast.id = "toastMsg";
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.left = "20px";
            toast.style.backgroundColor = "#28a745";
            toast.style.color = "white";
            toast.style.padding = "8px 16px";
            toast.style.borderRadius = "25px";
            toast.style.zIndex = "9999";
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 2000);
    }

    // التبديل بين وضع التعديل والقراءة
    document.getElementById("toggleModeBtn").addEventListener("click", () => {
        if (isEditMode) {
            // الخروج من وضع التعديل
            isEditMode = false;
            document.getElementById("modeLabel").innerHTML = "وضع الطالب (عرض فقط)";
            document.getElementById("modeLabel").style.background = "#ffc107";
            document.getElementById("toggleModeBtn").textContent = "🔐 الدخول لوضع التعديل (للمعلم)";
            render();
        } else {
            // الدخول لوضع التعديل (بدون كلمة مرور لتجنب الأعطال، يمكن إضافتها لاحقاً)
            // لكن يمكنك وضع شرط بسيط:
            let pwd = prompt("أدخل كلمة المرور للتعديل:");
            if (pwd === "1234") {
                isEditMode = true;
                document.getElementById("modeLabel").innerHTML = "وضع المعلم (يمكنك التعديل)";
                document.getElementById("modeLabel").style.background = "#dc3545";
                document.getElementById("toggleModeBtn").textContent = "🚪 الخروج من وضع التعديل";
                render();
                showToast("تم تفعيل وضع التعديل");
            } else if (pwd !== null) {
                alert("كلمة المرور غير صحيحة");
            }
        }
    });

    loadData();
</script>
</body>
</html>
