<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إشعارات الاختبارات</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',Tahoma,sans-serif;background:#f4f6f9;padding:20px}
.header{background:#0056b3;color:#fff;padding:25px;border-radius:15px;text-align:center;margin-bottom:20px}
.header h2{font-size:22px;margin-bottom:10px}
.badge{background:#ffc107;color:#000;padding:6px 15px;border-radius:20px;font-size:13px;font-weight:bold;display:inline-block}
.card{background:#fff;padding:18px;margin:12px 0;border-radius:12px;border-right:4px solid #0056b3;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card h3{color:#0056b3;margin-bottom:10px;font-size:17px}
.card p{color:#555;line-height:1.6}
.editable{background:#fff9c4;border:2px dashed #fbc02d;padding:8px;border-radius:8px;outline:none}
.btn{display:block;width:100%;padding:16px;margin:8px 0;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;color:#fff}
.btn-blue{background:#00acc1}.btn-green{background:#2e7d32}.btn-gray{background:#757575}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:30px;border-radius:15px;width:90%;max-width:350px;text-align:center}
.modal input{width:100%;padding:15px;margin:20px 0;border:2px solid #ddd;border-radius:10px;font-size:18px;text-align:center}
.error{color:#f44336;font-size:14px;display:none;margin:10px 0}
</style>
</head>
<body>

<div class="header">
<h2>📢 نظام الإشعارات - الاختبارات</h2>
<span class="badge" id="badge">وضع الطالب (عرض فقط)</span>
</div>

<div id="list"></div>

<button class="btn btn-blue" onclick="openModal()">🔐 الدخول لوضع التعديل (للمعلم)</button>
<button class="btn btn-green" id="saveBtn" style="display:none" onclick="saveAll()">💾 حفظ جميع التغييرات</button>
<button class="btn btn-green" id="addBtn" style="display:none" onclick="addNew()">➕ إضافة إشعار جديد</button>
<button class="btn btn-gray" id="exitBtn" style="display:none" onclick="exitMode()">🔓 الخروج من وضع التعديل</button>

<p style="text-align:center;color:#888;font-size:12px;margin-top:30px">متوافق مع الجوال - محمد عيادة 2026</p>

<div class="modal" id="modal">
<div class="modal-content">
<h3>🔐 أدخل كلمة المرور</h3>
<p style="color:#666;margin:10px 0">للدخول إلى وضع التعديل</p>
<input type="password" id="pwd" placeholder="كلمة المرور..." inputmode="numeric">
<p class="error" id="err">❌ كلمة المرور غير صحيحة</p>
<button class="btn btn-blue" onclick="checkPass()">دخول</button>
<button class="btn btn-gray" onclick="closeModal()">إلغاء</button>
</div>
</div>

<script>
const PASS="12345";
let admin=false;
let data=JSON.parse(localStorage.getItem('notifs')||'null')||[
{id:1,title:"📢 تذكير: اختبار منتصف الفصل",content:"احضر معك الكتاب والكراس مهم الكراسه"},
{id:2,title:"📊 نتائج الاختبار التجريبي",content:"تم إعلان نتائج الاختبار التجريبي. درجة النجاح 70%."},
{id:3,title:"⏳ موعد التسليم",content:"آخر موعد للتسجيل في الاختبار النهائي هو 20 أبريل 2025."}
];

function render(){
const list=document.getElementById('list');
if(data.length===0){
list.innerHTML='<p style="text-align:center;padding:30px;color:#888">لا توجد إشعارات</p>';
}else{
list.innerHTML=data.map((item,i)=>'<div class="card"><h3 class="'+(admin?'editable':'')+'" '+(admin?'contenteditable="true"':'')+' oninput="data['+i+'].title=this.innerText">'+item.title+'</h3><p class="'+(admin?'editable':'')+'" '+(admin?'contenteditable="true"':'')+' oninput="data['+i+'].content=this.innerText">'+item.content+'</p>'+(admin?'<button class="btn btn-gray" style="padding:10px;margin-top:10px" onclick="del('+i+')">🗑️ حذف</button>':'')+'</div>').join('');
}
document.getElementById('saveBtn').style.display=admin?'block':'none';
document.getElementById('addBtn').style.display=admin?'block':'none';
document.getElementById('exitBtn').style.display=admin?'block':'none';
const b=document.getElementById('badge');
b.textContent=admin?'وضع المعلم (تعديل مفعل)':'وضع الطالب (عرض فقط)';
b.style.background=admin?'#f44336':'#ffc107';
b.style.color=admin?'#fff':'#000';
}

function openModal(){
document.getElementById('modal').style.display='flex';
document.getElementById('pwd').value='';
document.getElementById('err').style.display='none';
setTimeout(function(){document.getElementById('pwd').focus();},300);
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function checkPass(){
var val=document.getElementById('pwd').value.trim();
if(val===PASS){
admin=true;
closeModal();
render();
}else{
document.getElementById('err').style.display='block';
}
}

function saveAll(){
localStorage.setItem('notifs',JSON.stringify(data));
alert('✅ تم حفظ التغييرات بنجاح!');
}

function addNew(){
data.unshift({id:Date.now(),title:"عنوان إشعار جديد",content:"اكتب محتوى الإشعار هنا..."});
render();
}

function del(i){
if(confirm('هل أنت متأكد من حذف هذا الإشعار؟')){
data.splice(i,1);
render();
}
}

function exitMode(){
admin=false;
render();
}

document.getElementById('pwd').addEventListener('keypress',function(e){
if(e.key==='Enter')checkPass();
});

render();
</script>

</body>
</html>
